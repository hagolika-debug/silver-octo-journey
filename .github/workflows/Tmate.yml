name: SSH Tunnel for HTTP Custom

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '120'
      custom_password:
        description: 'Custom password (leave blank for auto-generated)'
        required: false
        type: string

jobs:
  ssh-tunnel:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH Server
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl

        # Enable password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

        # Set password
        if [ -z "${{ github.event.inputs.custom_password }}" ]; then
          PASSWORD=$(openssl rand -base64 12 | tr -d '=+/')
        else
          PASSWORD="${{ github.event.inputs.custom_password }}"
        fi

        echo "runner:$PASSWORD" | sudo chpasswd
        sudo systemctl restart ssh

        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV

        echo "✅ SSH Server configured"
        echo "Username: runner"
        echo "Password: $PASSWORD"

    - name: Install Bore
      run: |
        echo "Installing bore tunnel client..."
        curl -L https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
          | tar xz
        sudo mv bore /usr/local/bin/bore
        bore --version
        echo "✅ Bore installed"

    - name: Create TCP Tunnel via Bore
      run: |
        # Start bore tunnel forwarding local SSH port to bore.pub
        bore local 22 --to bore.pub > bore.log 2>&1 &
        BORE_PID=$!
        echo "BORE_PID=$BORE_PID" >> $GITHUB_ENV

        echo "Waiting for bore tunnel to establish..."
        sleep 8

        # bore prints: listening at bore.pub:PORT
        PORT=""
        for i in {1..20}; do
          echo "Attempt $i..."
          cat bore.log || true

          PORT=$(grep -o 'bore.pub:[0-9]*' bore.log | grep -o '[0-9]*$' | head -1)

          if [ ! -z "$PORT" ]; then
            echo "✅ Tunnel ready on port $PORT"
            break
          fi

          echo "Not ready yet, retrying in 3s..."
          sleep 3
        done

        if [ -z "$PORT" ]; then
          echo "❌ Could not get bore port. Full log:"
          cat bore.log
          exit 1
        fi

        echo "TUNNEL_HOST=bore.pub" >> $GITHUB_ENV
        echo "TUNNEL_PORT=$PORT" >> $GITHUB_ENV

        echo "✅ Bore tunnel created"
        echo "   Host: bore.pub"
        echo "   Port: $PORT"

    - name: Display Connection Info
      run: |
        echo "========================================="
        echo "✅ SSH TUNNEL - READY FOR CONNECTION"
        echo "========================================="
        echo ""
        echo "🔑 SSH Credentials:"
        echo "   Username: $SSH_USER"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "🌐 Bore Public Endpoint:"
        echo "   Host: $TUNNEL_HOST"
        echo "   Port: $TUNNEL_PORT"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📱 HTTP CUSTOM CONNECTION STRING:"
        echo ""
        echo "$TUNNEL_HOST:$TUNNEL_PORT@$SSH_USER:$SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "🔧 Standard SSH Command:"
        echo "   ssh $SSH_USER@$TUNNEL_HOST -p $TUNNEL_PORT"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "⏱️  Session Information:"
        echo "   Duration: ${{ github.event.inputs.duration }} minutes"
        echo "   Started:  $(date '+%Y-%m-%d %H:%M:%S UTC')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "⚠️  Keep this workflow running to maintain the tunnel"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Test SSH Port
      run: |
        echo "🔍 Testing tunnel connectivity..."
        timeout 5 nc -zv $TUNNEL_HOST $TUNNEL_PORT 2>&1 || echo "Note: nc test may fail but SSH should still work"
        echo "✅ Tunnel is ready"

    - name: Start Tmate (Backup Connection)
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        detached: false

    - name: Keep Session Alive
      run: |
        echo ""
        echo "🟢 SSH TUNNEL IS ACTIVE"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "CONNECTION STRING: $TUNNEL_HOST:$TUNNEL_PORT@$SSH_USER:$SSH_PASS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Session active for ${{ github.event.inputs.duration }} minutes"
        echo ""

        DURATION=${{ github.event.inputs.duration }}
        COUNTER=0

        while [ $COUNTER -lt $DURATION ]; do
          sleep 60
          COUNTER=$((COUNTER + 1))
          REMAINING=$((DURATION - COUNTER))

          if [ $((COUNTER % 5)) -eq 0 ]; then
            echo "[$(date '+%H:%M:%S')] Session active - $REMAINING minutes remaining"

            # Check bore process is still running
            if kill -0 $BORE_PID 2>/dev/null; then
              echo "   ✅ Bore tunnel process alive (PID $BORE_PID)"
            else
              echo "   ⚠️  Bore process died — attempting restart..."
              bore local 22 --to bore.pub >> bore.log 2>&1 &
              BORE_PID=$!
              echo "   🔄 Restarted bore (PID $BORE_PID)"
            fi
          fi
        done

        echo "🔴 Session expired after $DURATION minutes"

    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up..."
        kill $BORE_PID 2>/dev/null || true
        echo "Session ended at $(date)"
