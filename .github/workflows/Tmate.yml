name: Public SSH Server with Password Auth

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '120'
      custom_password:
        description: 'Custom password (leave blank for auto)'
        required: false
        type: string

jobs:
  ssh-tunnel:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH Server
      run: |
        # Install SSH server and tools
        sudo apt-get update
        sudo apt-get install -y openssh-server curl
        
        # Configure SSH for password auth
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
        
        # Set password
        if [ -z "${{ github.event.inputs.custom_password }}" ]; then
          PASSWORD=$(openssl rand -base64 12)
        else
          PASSWORD="${{ github.event.inputs.custom_password }}"
        fi
        
        echo "runner:$PASSWORD" | sudo chpasswd
        
        # Start SSH
        sudo systemctl enable ssh
        sudo systemctl start ssh
        
        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV
        
    - name: Create SSH Tunnel (serveo.net)
      run: |
        # This creates a public tunnel using serveo.net
        # No account needed - completely free
        ssh -R 0:localhost:22 serveo.net &
        sleep 5
        
        # Get the public URL
        PUBLIC_URL=$(curl -s http://serveo.net | grep -o 'ssh -R .*' | head -1 || echo "")
        
        echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV
        
    - name: Display Connection Info
      run: |
        echo "========================================="
        echo "🔐 SSH CONNECTION DETAILS"
        echo "========================================="
        echo ""
        echo "Username: $SSH_USER"
        echo "Password: $SSH_PASS"
        echo ""
        echo "📱 HTTP Custom Format:"
        echo "serveo.net:22@$SSH_USER:$SSH_PASS"
        echo ""
        echo "Or if using custom subdomain:"
        echo "your-subdomain.serveo.net:22@$SSH_USER:$SSH_PASS"
        echo "========================================="
        
    - name: Start tmate (as fallback)
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        detached: false
