name: Tmate SSH Session

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      timeout:
        description: 'Session timeout in minutes'
        required: false
        default: '60'

jobs:
  tmate-ssh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tmate openssh-server
        sudo systemctl enable ssh
        sudo systemctl start ssh
    
    - name: Setup SSH with password authentication
      run: |
        # Set password for runner user
        PASSWORD="runnerpass123"
        echo "runner:$PASSWORD" | sudo chpasswd
        
        # Configure SSH to allow password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
        # Get IP address
        IP_ADDRESS=$(curl -s ifconfig.me)
        SSH_PORT=22
        
        # Store credentials
        echo "SSH_HOST=$IP_ADDRESS" >> $GITHUB_ENV
        echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV
        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV
        
        echo "========================================="
        echo "SSH Connection Details:"
        echo "Host: $IP_ADDRESS"
        echo "Port: $SSH_PORT"
        echo "User: runner"
        echo "Password: $PASSWORD"
        echo "========================================="
        echo ""
        echo "HTTP Custom Format:"
        echo "$IP_ADDRESS:$SSH_PORT@runner:$PASSWORD"
        echo "========================================="
    
    - name: Start tmate session
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        timeout-minutes: ${{ github.event.inputs.timeout || 60 }}
    
    - name: Keep session alive
      run: |
        echo "SSH session active"
        echo "Use this format for HTTP Custom:"
        echo "$SSH_HOST:$SSH_PORT@$SSH_USER:$SSH_PASS"
        echo ""
        echo "You can also connect via:"
        echo "ssh $SSH_USER@$SSH_HOST -p $SSH_PORT"
        
        # Keep the session alive until manually stopped
        while true; do
          sleep 60
          echo "Session still active at $(date)"
        done
