name: Ngrok SSH Tunnel for HTTP Custom

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '120'
      custom_password:
        description: 'Custom password (leave blank for auto-generated)'
        required: false
        type: string

jobs:
  ngrok-ssh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH Server
      run: |
        # Install SSH server
        sudo apt-get update
        sudo apt-get install -y openssh-server curl jq
        
        # Configure SSH for password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        
        # Set password
        if [ -z "${{ github.event.inputs.custom_password }}" ]; then
          PASSWORD=$(openssl rand -base64 12 | tr -d '=+/')
        else
          PASSWORD="${{ github.event.inputs.custom_password }}"
        fi
        
        echo "runner:$PASSWORD" | sudo chpasswd
        
        # Start SSH service
        sudo systemctl restart ssh
        
        # Save credentials
        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV
        
        echo "✅ SSH Server configured"
        
    - name: Install and Setup Ngrok
      run: |
        # Download ngrok
        cd /tmp
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xzf ngrok-v3-stable-linux-amd64.tgz
        sudo mv ngrok /usr/local/bin/
        
        # Add your auth token
        ngrok config add-authtoken 2tdyO3klTR5ndRfrTV0jBQqRA7y_3TJ5rChVMhNt87hdNLMYz
        
        echo "✅ Ngrok configured"
        
    - name: Create SSH Tunnel with Ngrok
      run: |
        # Start ngrok tunnel for SSH in background
        ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &
        NGROK_PID=$!
        echo "NGROK_PID=$NGROK_PID" >> $GITHUB_ENV
        
        # Wait for ngrok to start
        echo "Waiting for ngrok to establish tunnel..."
        sleep 8
        
        # Get the ngrok URL with better error handling
        echo "Fetching ngrok tunnel info..."
        
        # Try multiple times to get the URL
        for i in {1..15}; do
          echo "Attempt $i..."
          RESPONSE=$(curl -s http://localhost:4040/api/tunnels)
          echo "Response: $RESPONSE"
          
          NGROK_URL=$(echo $RESPONSE | jq -r '.tunnels[] | select(.proto=="tcp") | .public_url' 2>/dev/null)
          
          if [ ! -z "$NGROK_URL" ] && [ "$NGROK_URL" != "null" ]; then
            echo "Found ngrok URL: $NGROK_URL"
            break
          fi
          sleep 2
        done
        
        if [ -z "$NGROK_URL" ] || [ "$NGROK_URL" == "null" ]; then
          echo "Failed to get ngrok URL. Showing ngrok.log:"
          cat ngrok.log
          exit 1
        fi
        
        echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
        
        # Extract host and port
        HOST=$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f1)
        PORT=$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f2)
        
        echo "NGROK_HOST=$HOST" >> $GITHUB_ENV
        echo "NGROK_PORT=$PORT" >> $GITHUB_ENV
        
        echo "✅ Ngrok tunnel created"
        echo "   Host: $HOST"
        echo "   Port: $PORT"
        
    - name: Display HTTP Custom Connection String
      run: |
        echo "========================================="
        echo "✅ NGROK SSH TUNNEL - READY FOR CONNECTION"
        echo "========================================="
        echo ""
        echo "🔑 SSH Credentials:"
        echo "   Username: $SSH_USER"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "🌐 Ngrok Public Endpoint:"
        echo "   Host: $NGROK_HOST"
        echo "   Port: $NGROK_PORT"
        echo "   Full URL: tcp://$NGROK_HOST:$NGROK_PORT"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📱 HTTP CUSTOM CONNECTION STRING:"
        echo ""
        echo "$NGROK_HOST:$NGROK_PORT@$SSH_USER:$SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "🔧 Alternative Connection Methods:"
        echo ""
        echo "Standard SSH Command:"
        echo "ssh $SSH_USER@$NGROK_HOST -p $NGROK_PORT"
        echo ""
        echo "Password: $SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "⏱️  Session Information:"
        echo "   Duration: ${{ github.event.inputs.duration }} minutes"
        echo "   Expires: $(date -d '+${{ github.event.inputs.duration }} minutes' '+%Y-%m-%d %H:%M:%S UTC')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "⚠️  IMPORTANT:"
        echo "• Keep this GitHub Actions workflow running"
        echo "• Copy the HTTP Custom string above exactly"
        echo "• Paste it in HTTP Custom app to connect"
        echo "• Session will auto-terminate after ${{ github.event.inputs.duration }} minutes"
        echo ""
        echo "💡 Ngrok provides a free subdomain automatically"
        echo "   No custom domain needed - use the host above"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
    - name: Display Ngrok Web Interface Info
      run: |
        echo ""
        echo "🔍 Monitor your tunnel at:"
        echo "   http://localhost:4040"
        echo "   (Available in GitHub Actions logs only)"
        echo ""
        
    - name: Start Tmate (Backup Connection)
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        detached: false
        
    - name: Keep Session Alive
      run: |
        echo ""
        echo "🟢 SSH TUNNEL IS ACTIVE"
        echo ""
        echo "Connection string: $NGROK_HOST:$NGROK_PORT@$SSH_USER:$SSH_PASS"
        echo ""
        echo "Session will remain active for ${{ github.event.inputs.duration }} minutes"
        echo ""
        
        # Keep the workflow running for the specified duration
        DURATION=${{ github.event.inputs.duration }}
        COUNTER=0
        
        while [ $COUNTER -lt $DURATION ]; do
          sleep 60
          COUNTER=$((COUNTER + 1))
          REMAINING=$((DURATION - COUNTER))
          
          # Show status every 5 minutes
          if [ $((COUNTER % 5)) -eq 0 ]; then
            echo "[$(date '+%H:%M:%S')] Session active - $REMAINING minutes remaining"
            
            # Show ngrok status
            TUNNEL_STATUS=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' 2>/dev/null)
            if [ ! -z "$TUNNEL_STATUS" ] && [ "$TUNNEL_STATUS" != "null" ]; then
              echo "   ✅ Ngrok tunnel: $TUNNEL_STATUS"
            else
              echo "   ⚠️  Ngrok tunnel may be experiencing issues"
            fi
          fi
        done
        
        echo ""
        echo "🔴 Session expired after $DURATION minutes"
        
    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up..."
        if [ ! -z "$NGROK_PID" ]; then
          kill $NGROK_PID 2>/dev/null || true
        fi
        echo "Session ended at $(date)"
