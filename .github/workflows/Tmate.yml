name: Tmate SSH Session

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      timeout:
        description: 'Session timeout in minutes'
        required: false
        default: '60'

jobs:
  tmate-ssh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server
        sudo systemctl enable ssh
        sudo systemctl start ssh
    
    - name: Setup SSH with password authentication
      run: |
        # Set password for runner user
        PASSWORD="runnerpass123"
        echo "runner:$PASSWORD" | sudo chpasswd
        
        # Configure SSH to allow password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
        # Store credentials
        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV
        
        echo "========================================="
        echo "SSH Connection Details:"
        echo "User: runner"
        echo "Password: $PASSWORD"
        echo "========================================="
    
    - name: Start tmate session
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        detached: false
    
    - name: Display connection format
      if: always()
      run: |
        echo "========================================="
        echo "📱 HTTP Custom Format:"
        echo "Use the tmate SSH URL from above with this format:"
        echo ""
        echo "Format: host:port@user:pass"
        echo ""
        echo "Example with tmate:"
        echo "ssh://tmate-user@tmate-host:port"
        echo ""
        echo "For HTTP Custom, you need:"
        echo "tmate-host:port@runner:$SSH_PASS"
        echo ""
        echo "⚠️  Note: tmate uses SSH key authentication by default"
        echo "The password setup is for local SSH access only"
        echo "========================================="
