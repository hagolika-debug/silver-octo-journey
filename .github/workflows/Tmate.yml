name: Working SSH Tunnel for HTTP Custom

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '120'

jobs:
  ssh-tunnel:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH Server
      run: |
        # Install SSH server and tools
        sudo apt-get update
        sudo apt-get install -y openssh-server curl sshpass
        
        # Configure SSH for password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        
        # Set password for runner
        PASSWORD="Xj/hnqYcldng2woD"
        echo "runner:$PASSWORD" | sudo chpasswd
        
        # Restart SSH
        sudo systemctl restart ssh
        
        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV
        
    - name: Create SSH Tunnel with serveo.net (Fixed)
      run: |
        # First, accept the host key
        ssh-keyscan -p 22 serveo.net >> ~/.ssh/known_hosts 2>/dev/null
        
        # Create reverse tunnel in background
        ssh -o StrictHostKeyChecking=accept-new -R 0:localhost:22 serveo.net &
        TUNNEL_PID=$!
        sleep 5
        
        echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
        
        # Get assigned subdomain
        sleep 3
        
    - name: Find Serveo Subdomain
      run: |
        # Check active tunnels
        echo "Checking tunnel status..."
        
        # Alternative: use a fixed subdomain
        SUBDOMAIN="github-ssh-${{ github.run_id }}"
        
        # Create tunnel with specific subdomain
        ssh -o StrictHostKeyChecking=accept-new -R $SUBDOMAIN:80:localhost:22 serveo.net &
        sleep 5
        
        echo "SERVEO_SUBDOMAIN=$SUBDOMAIN" >> $GITHUB_ENV
        
    - name: Display HTTP Custom Connection String
      run: |
        echo "========================================="
        echo "✅ WORKING SSH CONNECTION DETAILS"
        echo "========================================="
        echo ""
        echo "🔑 Credentials:"
        echo "   Username: $SSH_USER"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "🌐 Connection Methods:"
        echo ""
        echo "Method 1 - Direct (if runner IP is public):"
        echo "$(curl -s ifconfig.me):22@$SSH_USER:$SSH_PASS"
        echo ""
        echo "Method 2 - Via Serveo.net:"
        echo "serveo.net:22@$SSH_USER:$SSH_PASS"
        echo ""
        echo "Method 3 - With custom subdomain:"
        echo "github-ssh-${{ github.run_id }}.serveo.net:22@$SSH_USER:$SSH_PASS"
        echo ""
        echo "========================================="
        echo "📱 HTTP Custom Input (copy this):"
        echo "serveo.net:22@$SSH_USER:$SSH_PASS"
        echo "========================================="
        
    - name: Keep Tunnel Alive
      run: |
        echo "Keeping tunnel alive for ${{ github.event.inputs.duration }} minutes..."
        echo "Press Ctrl+C to stop"
        
        # Keep the workflow running
        while true; do
          sleep 60
          echo "Session still active - $(date)"
        done
